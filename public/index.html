<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Playground</title>
    <style>
        :root {
            --bg: #07100d;
            --panel: #101a16;
            --panel-2: #14231d;
            --text: #e6f4ec;
            --muted: #92a79b;
            --border: #254036;
            --accent: #f4b942;
            --accent-2: #35c08b;
            --danger: #ff6b5f;
            --code: #08130f;
        }

        * { box-sizing: border-box; }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            overflow-x: hidden;
            color: var(--text);
            font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(244, 185, 66, 0.16), transparent 34rem),
                radial-gradient(circle at bottom right, rgba(53, 192, 139, 0.14), transparent 30rem),
                linear-gradient(135deg, #050907 0%, var(--bg) 52%, #0c1511 100%);
        }

        .shell {
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
            min-height: 100svh;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(16, 26, 22, 0.88);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            letter-spacing: -0.04em;
        }

        .subtitle {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        select,
        button {
            max-width: 100%;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 14px;
            color: var(--text);
            background: var(--panel-2);
            font: inherit;
        }

        button {
            cursor: pointer;
            font-weight: 700;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
        }

        .run {
            color: #08130f;
            background: var(--accent);
            border-color: transparent;
        }

        .share {
            background: transparent;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 18px;
            padding: 18px;
            min-height: 0;
        }

        .pane {
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: calc(100vh - 118px);
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(16, 26, 22, 0.72);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        }

        .pane-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.72rem;
            font-weight: 800;
        }

        textarea,
        pre {
            width: 100%;
            height: 100%;
            min-height: 0;
            margin: 0;
            padding: 18px;
            border: 0;
            outline: 0;
            resize: none;
            color: #dff8ea;
            background: var(--code);
            font: 14px/1.55 "Iosevka", "Cascadia Code", "Fira Code", Consolas, monospace;
            tab-size: 4;
            white-space: pre-wrap;
            overflow: auto;
        }

        pre {
            color: #bde7ff;
        }

        .status {
            color: var(--muted);
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 820px) {
            .navbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 16px;
            }

            .controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                width: 100%;
            }

            .controls select {
                grid-column: 1 / -1;
                width: 100%;
            }

            .workspace {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 12px;
            }

            .pane {
                min-height: 42svh;
                border-radius: 18px;
            }

            textarea,
            pre {
                padding: 14px;
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            .controls {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="navbar">
            <div>
                <h1>Code Playground</h1>
                <div class="subtitle">Isolated containers, no network, bounded runtime.</div>
            </div>
            <div class="controls">
                <select id="language" aria-label="Language">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="ruby">Ruby</option>
                    <option value="php">PHP</option>
                    <option value="lua">Lua</option>
                    <option value="perl">Perl</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="rust">Rust</option>
                    <option value="go">Go</option>
                    <option value="java">Java</option>
                    <option value="nim">Nim</option>
                    <option value="python-ds">Python DS</option>
                    <option value="cpp-drogon">C++ Drogon</option>
                </select>
                <button class="share" id="shareBtn" type="button">Share</button>
                <button class="run" id="runBtn" type="button">Run Code</button>
            </div>
        </header>

        <section class="workspace">
            <div class="pane">
                <div class="pane-header">
                    <span>Editor</span>
                    <span id="bytes">0 / 65536 bytes</span>
                </div>
                <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
            </div>
            <div class="pane">
                <div class="pane-header">
                    <span>Terminal Output</span>
                    <span id="state">Idle</span>
                </div>
                <pre id="output" class="status">Ready. Select a language and write your code.</pre>
            </div>
        </section>
    </main>

    <script>
        const maxBytes = 65536;
        const snippets = {
            python: 'def greet(name):\n    print(f"Hello, {name}! Welcome to the sandbox.")\n\ngreet("Developer")',
            javascript: 'function greet(name) {\n    console.log(`Hello, ${name}! Welcome to the sandbox.`);\n}\n\ngreet("Developer");',
            ruby: 'name = "Developer"\nputs "Hello, #{name} from Ruby."',
            php: '<?php\n$name = "Developer";\necho "Hello, $name from PHP.\\n";\n',
            lua: 'local name = "Developer"\nprint("Hello, " .. name .. " from Lua.")',
            perl: 'use strict;\nuse warnings;\n\nmy $name = "Developer";\nprint "Hello, $name from Perl.\\n";',
            c: '#include <stdio.h>\n\nint main() {\n    printf("Hello from C.\\n");\n    return 0;\n}',
            cpp: '#include <iostream>\n\nint main() {\n    std::cout << "Hello from C++\\\\n";\n    return 0;\n}',
            rust: 'fn main() {\n    println!("Hello from Rust.");\n}',
            go: 'package main\n\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Hello from Go.")\n}',
            java: 'public class Snippet {\n    public static void main(String[] args) {\n        System.out.println("Hello from Java.");\n    }\n}',
            nim: 'echo "Hello from Nim."',
            'python-ds': 'import numpy as np\n\nprint(np.array([1, 2, 3]).sum())',
            'cpp-drogon': '#include <drogon/drogon.h>\n#include <iostream>\n\nint main() {\n    std::cout << "Drogon headers available.\\\\n";\n    return 0;\n}'
        };

        const editor = document.getElementById('editor');
        const language = document.getElementById('language');
        const runBtn = document.getElementById('runBtn');
        const shareBtn = document.getElementById('shareBtn');
        const output = document.getElementById('output');
        const state = document.getElementById('state');
        const bytes = document.getElementById('bytes');

        function byteLength(value) {
            return new TextEncoder().encode(value).length;
        }

        function updateBytes() {
            const used = byteLength(editor.value);
            bytes.textContent = `${used} / ${maxBytes} bytes`;
            bytes.className = used > maxBytes ? 'error' : '';
        }

        function setOutput(text, isError = false) {
            output.textContent = text;
            output.className = isError ? 'error' : '';
            output.scrollTop = output.scrollHeight;
        }

        function currentPayload() {
            return { code: editor.value, language: language.value };
        }

        language.addEventListener('change', () => {
            if (!editor.value.trim() || Object.values(snippets).includes(editor.value)) {
                editor.value = snippets[language.value] || '';
                updateBytes();
            }
        });

        editor.addEventListener('input', updateBytes);

        editor.addEventListener('keydown', (event) => {
            if (event.key === 'Tab') {
                event.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.slice(0, start) + '    ' + editor.value.slice(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updateBytes();
            }
        });

        runBtn.addEventListener('click', async () => {
            const payload = currentPayload();
            if (byteLength(payload.code) > maxBytes) {
                setOutput('Code exceeds 64KB limit.', true);
                return;
            }

            runBtn.disabled = true;
            state.textContent = 'Running';
            setOutput('Executing in sandbox...');
            try {
                const response = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Execution failed');
                setOutput(data.output, data.output.includes('[Error]'));
            } catch (err) {
                setOutput(`Execution failed: ${err.message}`, true);
            } finally {
                runBtn.disabled = false;
                state.textContent = 'Idle';
            }
        });

        shareBtn.addEventListener('click', async () => {
            const payload = currentPayload();
            if (byteLength(payload.code) > maxBytes) {
                setOutput('Code exceeds 64KB limit.', true);
                return;
            }

            shareBtn.disabled = true;
            shareBtn.textContent = 'Saving...';
            try {
                const response = await fetch('/snippet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Save failed');
                const url = `${window.location.origin}/?id=${encodeURIComponent(data.id)}`;
                history.pushState({}, '', `/?id=${encodeURIComponent(data.id)}`);
                await navigator.clipboard.writeText(url);
                shareBtn.textContent = 'Copied URL';
            } catch (err) {
                setOutput(`Share failed: ${err.message}`, true);
                shareBtn.textContent = 'Share';
            } finally {
                setTimeout(() => {
                    shareBtn.disabled = false;
                    shareBtn.textContent = 'Share';
                }, 1400);
            }
        });

        async function loadSnippet() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return false;
            const response = await fetch(`/snippet/${encodeURIComponent(id)}`);
            if (!response.ok) return false;
            const data = await response.json();
            language.value = data.language;
            editor.value = data.code;
            updateBytes();
            return true;
        }

        (async () => {
            if (!(await loadSnippet())) {
                editor.value = snippets.python;
                updateBytes();
            }
        })();
    </script>
</body>
</html>
